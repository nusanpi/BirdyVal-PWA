<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Admin - Subir Datos</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 2rem;
        background: #f0f0f0;
      }
      .card {
        background: white;
        padding: 2rem;
        border-radius: 8px;
        max-width: 600px;
        margin: 0 auto;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
      button {
        background: #4fa17f;
        color: white;
        border: none;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        border-radius: 5px;
      }
      button:hover {
        background: #3e8e6d;
      }
      #status {
        margin-top: 20px;
        padding: 10px;
        background: #eee;
        border-radius: 4px;
        font-family: monospace;
      }
    </style>
    <link rel="icon" href="img/logo_sintexto.png" type="image/png" />
  </head>
  <body>
    <div class="card">
      <h1 data-i18n="Administración BirdyVal">Administración BirdyVal</h1>
      <p
        data-i18n="Pulsa el botón para leer <code>aves_cv_enriched.json</code> y subirlo a Firestore."
      >
        Pulsa el botón para leer <code>aves_cv_enriched.json</code> y subirlo a
        Firestore.
      </p>

      <script type="module" src="./js/upload.js"></script>
      <script type="module">
        import { auth } from "./js/firebase.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const ADMIN_EMAILS = ["admin@example.com"]; // Set your admin email(s) here

        onAuthStateChanged(auth, (user) => {
          if (!user || !ADMIN_EMAILS.includes(user.email)) {
            window.location.replace("index.html");
          }
        });
      </script>

      <button onclick="subirDatos()" data-i18n="🚀 Subir Pájaros a la Nube">
        🚀 Subir Pájaros a la Nube
      </button>

      <div id="status">Esperando...</div>
    </div>
  </body>
</html>
